<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <script src="./src/index.js" defer></script>
  </head>
  <body>
    <main>
      <header>
        <h1 id="title">Weather app</h1>
      </header>
      <section>
        <article id="data">
          <h3>time: <span id="time">00:00:00</span></h3>
          <b
            ><p>temperature <span id="temp">0</span>°C</p></b
          >
          <b
            ><p>wind speed <span id="windspeed">00</span>km/h</p></b
          >
          <b
            ><p>hummity <span id="hummity">0</span>%</p></b
          >
        </article>
      </section>
    </main>
  </body>
</html>
